<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegetable Service Engine - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            color: #2d3748;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .role-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            display: block;
        }

        .role-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .role-card.manager {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .role-card.cashier {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .role-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .role-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .role-description {
            font-size: 0.9em;
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            .role-grid {
                grid-template-columns: 1fr;
            }

            .login-container {
                padding: 30px;
            }

            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🥬 Vegetable Service Engine 🥕</h1>
        <p class="subtitle">Select your role to continue</p>

        <div class="role-grid">
           
            <a href="login.html?role=manager" class="role-card manager">
                <div class="role-icon">🔧</div>
                <div class="role-title">Manager</div>
                <div class="role-description">Manage inventory, update prices, add/remove items</div>
            </a>

            
            <a href="login.html?role=cashier" class="role-card cashier">
                <div class="role-icon">💰</div>
                <div class="role-title">Cashier</div>
                <div class="role-description">Process sales, generate receipts, view prices</div>
            </a>
        </div>
    </div>
</body>
</html>
