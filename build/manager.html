<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Portal - Vegetable Service Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
            
            
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .role-badge {
            background: white;
            color: #f5576c;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #f5576c;
        }

        .card-icon {
            font-size: 2em;
            margin-right: 15px;
        }

        .card h2 {
            color: #2d3748;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
            font-size: 0.9em;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #f5576c;
        }

        button {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 25px;
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #f5576c;
        }

        .result-header h2 {
            color: #2d3748;
            font-size: 1.5em;
        }

        .clear-btn {
            width: auto;
            padding: 8px 20px;
            font-size: 0.9em;
            background: #e53e3e;
        }

        .clear-btn:hover {
            box-shadow: 0 5px 15px rgba(229, 62, 62, 0.4);
        }

        #result {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            min-height: 100px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            color: #2d3748;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .empty-result {
            color: #a0aec0;
            font-style: italic;
            text-align: center;
            padding: 40px 20px;
        }

        .success {
            color: #38a169;
            font-weight: 600;
        }

        .error {
            color: #e53e3e;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
   <div class="header">
        <h1>🔧 Manager Portal</h1>
        <p>Inventory Management System</p>
        <div style="display: flex; justify-content: center; gap: 15px; align-items: center; margin-top: 15px;">
            <div class="role-badge">👤 MANAGER: <span id="username"></span></div>
            <button onclick="logout()" style="width: auto; padding: 8px 20px; font-size: 0.9em; background: #e53e3e;">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="grid">
            <!-- Add Vegetable Card -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">➕</span>
                    <h2>Add New Vegetable</h2>
                </div>
                <div class="form-group">
                    <label for="addName">Vegetable Name</label>
                    <input type="text" id="addName" placeholder="e.g., Spinach">
                </div>
                <div class="form-group">
                    <label for="addPrice">Price per kg ($)</label>
                    <input type="number" id="addPrice" placeholder="0.00" step="0.01" min="0">
                </div>
                <button onclick="addVegetable()">Add to Inventory</button>
            </div>

            <!-- Update Price Card -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">✏️</span>
                    <h2>Update Price</h2>
                </div>
                <div class="form-group">
                    <label for="updateName">Vegetable Name</label>
                    <input type="text" id="updateName" placeholder="e.g., Tomato">
                </div>
                <div class="form-group">
                    <label for="updatePrice">New Price per kg ($)</label>
                    <input type="number" id="updatePrice" placeholder="0.00" step="0.01" min="0">
                </div>
                <button onclick="updateVegetable()">Update Price</button>
            </div>

            <!-- Delete Vegetable Card -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🗑️</span>
                    <h2>Remove Vegetable</h2>
                </div>
                <div class="form-group">
                    <label for="deleteName">Vegetable Name</label>
                    <input type="text" id="deleteName" placeholder="e.g., Carrot">
                </div>
                <button onclick="deleteVegetable()">Remove from Inventory</button>
            </div>

            <!-- View Inventory Card -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">📋</span>
                    <h2>View Inventory</h2>
                </div>
                <p style="color: #4a5568; margin-bottom: 15px;">View all vegetables and their current prices.</p>
                <button onclick="viewInventory()">View All Vegetables</button>
            </div>
        </div>

        <!-- Result Display -->
        <div class="result-section">
            <div class="result-header">
                <h2>📊 Management Result</h2>
                <button class="clear-btn" onclick="clearResult()">Clear</button>
            </div>
            <div id="result" class="empty-result">
                Results will appear here after performing an operation...
            </div>
        </div>
    </div>

    <script>
        // Check if user is logged in
        if (sessionStorage.getItem('loggedIn') !== 'true' || 
            sessionStorage.getItem('role') !== 'manager') {
            window.location.href = 'login.html?role=manager';
        }
    </script>

    <script>
        function showResult(text, type = 'normal') {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = text;
            resultDiv.className = type === 'success' ? 'success' : type === 'error' ? 'error' : '';
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function showError(error) {
            showResult('❌ ERROR: ' + error, 'error');
        }

        function clearResult() {
            document.getElementById('result').className = 'empty-result';
            document.getElementById('result').textContent = 'Results will appear here after performing an operation...';
        }

        async function addVegetable() {
            const name = document.getElementById('addName').value.trim();
            const price = document.getElementById('addPrice').value;
            
            if (!name || !price) {
                showError('Please enter both vegetable name and price');
                return;
            }
            
            try {
                const response = await fetch('vegetable', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `action=add&vegetable=${encodeURIComponent(name)}&price=${price}`
                });
                const result = await response.text();
                showResult(result, result.includes('SUCCESS') ? 'success' : 'error');
                
                if (result.includes('SUCCESS')) {
                    document.getElementById('addName').value = '';
                    document.getElementById('addPrice').value = '';
                    viewInventory();
                }
            } catch (error) {
                showError(error.message);
            }
        }

        async function updateVegetable() {
            const name = document.getElementById('updateName').value.trim();
            const price = document.getElementById('updatePrice').value;
            
            if (!name || !price) {
                showError('Please enter both vegetable name and new price');
                return;
            }
            
            try {
                const response = await fetch('vegetable', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `action=update&vegetable=${encodeURIComponent(name)}&price=${price}`
                });
                const result = await response.text();
                showResult(result, result.includes('SUCCESS') ? 'success' : 'error');
                
                if (result.includes('SUCCESS')) {
                    document.getElementById('updateName').value = '';
                    document.getElementById('updatePrice').value = '';
                    viewInventory();
                }
            } catch (error) {
                showError(error.message);
            }
        }

        async function deleteVegetable() {
            const name = document.getElementById('deleteName').value.trim();
            
            if (!name) {
                showError('Please enter vegetable name');
                return;
            }
            
            if (!confirm(`Are you sure you want to delete "${name}"?`)) {
                return;
            }
            
            try {
                const response = await fetch('vegetable', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `action=delete&vegetable=${encodeURIComponent(name)}`
                });
                const result = await response.text();
                showResult(result, result.includes('SUCCESS') ? 'success' : 'error');
                
                if (result.includes('SUCCESS')) {
                    document.getElementById('deleteName').value = '';
                    viewInventory();
                }
            } catch (error) {
                showError(error.message);
            }
        }

        async function viewInventory() {
            try {
                const response = await fetch('vegetable', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: 'action=list'
                });
                const result = await response.text();
                showResult(result, result.includes('ERROR') ? 'error' : 'normal');
            } catch (error) {
                showError(error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        const card = input.closest('.card');
                        const button = card.querySelector('button');
                        if (button) button.click();
                    }
                });
            });

            viewInventory();
        });

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        // Display username
        document.getElementById('username').textContent = sessionStorage.getItem('username') || 'User';
    </script>
</body>
</html>
